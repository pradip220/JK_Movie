        .movie-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .movie-card img { width: 100%; height: 230px; object-fit: cover; }
        .movie-card h3 { font-size: 12px; margin: 0; text-align: center; padding: 10px; height: 35px; overflow: hidden; color: #fff; }

        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10001; color: white; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

<body>

    <div id="ad-overlay">
        <div class="ad-box">
            <script type="text/javascript">
                atOptions = { 'key' : '723bc09c3bb81cc37dcc39806740dfcd', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/723bc09c3bb81cc37dcc39806740dfcd/invoke.js"></script>

        <p id="ad-timer" style="font-weight: bold; font-size: 18px;">Loading Content in 5 seconds...</p>

    <header>
        <div class="main-nav">
            <button class="icon-btn">☰</button>

        </div>
        <div id="search-container"><input type="text" id="search-input" placeholder="মুভি খুঁজুন..." onkeypress="handleSearchEnter(event)"></div>
        <div class="category-box">
            <div class="cat-item" onclick="showCategoryAd('Trending')">🔥 Trending Now</div>
            <div class="cat-item" onclick="showCategoryAd('Hollywood')">🎬 Hollywood</div>
            <div class="cat-item" onclick="showCategoryAd('Bollywood')">🇮🇳 Bollywood</div>
        </div>
    </header>

    <div class="content-area">
        <div class="section-title" id="main-title">🔥 Trending (Hollywood & Bollywood Mix)</div>
        <div class="container" id="featured-grid"></div>

        <div class="section-title" id="secondary-title">Latest Global Updates</div>
        <div class="container" id="mixed-grid"></div>
    </div>

    <div id="app-download-banner">
        <div style="display: flex; flex-direction: column;">
            <span style="font-size: 13px; font-weight: bold;">JK Movies App</span>
            <span style="font-size: 10px;">Safe & Secure Install</span>
        </div>
        <div style="display:flex; align-items:center;">
            <a href="https://drive.google.com/uc?export=download&id=1SHavE6N8LH0W3X7cNphKY6YXID76xq66" style="background:#000; color:#ffcc00; padding:8px 15px; border-radius:20px; font-weight:bold; text-decoration:none; font-size:12px;">INSTALL</a>
            <button onclick="document.getElementById('app-download-banner').style.display='none'" style="background:none; border:none; font-size:24px; margin-left:10px; cursor:pointer;">×</button>
        </div>
    </div>

    <script>
        const API_KEY = '0940ae0fad7498e6f74514a9691fb571';

        // ব্যাক করলে যাতে অ্যাড না থাকে
        window.onpageshow = function() { document.getElementById('ad-overlay').style.display = 'none'; };

        function toggleSearch() {
            const sc = document.getElementById('search-container');
            sc.style.display = (sc.style.display === 'block') ? 'none' : 'block';
        }

        // ডাইনামিক এসইও ফাংশন
        function updateDynamicSEO(movieName) {
            const year = new Date().getFullYear();
            document.title = `${movieName} Full Movie Download HD Free - JK Movies ${year}`;
            document.getElementById('dyn-desc').setAttribute('content', `Download ${movieName} and other top trending movies at JK Movies. High quality 720p and 1080p links.`);
        }

        function showCategoryAd(type) {
            const overlay = document.getElementById('ad-overlay');
            const timerText = document.getElementById('ad-timer');
            let timeLeft = 5;
            overlay.style.display = 'flex';
            const timer = setInterval(() => {
                timeLeft--;
                timerText.innerText = `Loading Content in ${timeLeft} seconds...`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    loadNewContent(type);
                }
            }, 1000);
        }

        function movieClickWithAd(targetUrl) {
            const overlay = document.getElementById('ad-overlay');
            const timerText = document.getElementById('ad-timer');
            let timeLeft = 5;
            overlay.style.display = 'flex';
            const timer = setInterval(() => {
                timeLeft--;
                timerText.innerText = `Redirecting in ${timeLeft} seconds...`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    window.location.href = targetUrl;
                }
            }, 1000);
        }

        async function fetchMixedTrending(gridId) {
            try {
                const [hRes, bRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=en&sort_by=popularity.desc`),
                    fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=hi&sort_by=popularity.desc`)
                ]);
                const hData = await hRes.json();
                const bData = await bRes.json();
                let mixed = [];
                for(let i=0; i<10; i++) {
                    if(bData.results[i]) mixed.push(bData.results[i]);
                    if(hData.results[i]) mixed.push(hData.results[i]);
                }
                renderMovies(mixed, gridId);
                if(mixed[0]) updateDynamicSEO(mixed[0].title);
            } catch (err) { console.error(err); }
        }

        async function loadNewContent(type) {
            const grid = document.getElementById('featured-grid');
            const title = document.getElementById('main-title');
            grid.innerHTML = 'লোড হচ্ছে...';
            if(type === 'Trending') { title.innerText = "🔥 Trending Mix"; fetchMixedTrending('featured-grid'); }
            else if(type === 'Hollywood') { title.innerText = "🎬 Top Hollywood"; fetchAPI(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=en&sort_by=popularity.desc`, 'featured-grid'); }
            else if(type === 'Bollywood') { title.innerText = "🇮🇳 Top Bollywood"; fetchAPI(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=hi&sort_by=popularity.desc`, 'featured-grid'); }
        }

        async function fetchAPI(url, gridId) {
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results.slice(0, 18), gridId);
            if(data.results[0]) updateDynamicSEO(data.results[0].title);
        }

        function renderMovies(movies, gridId) {
            const grid = document.getElementById(gridId);
            if(!grid) return;
            grid.innerHTML = '';
            movies.forEach(movie => {
                if (!movie.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<div class="rating">⭐ ${movie.vote_average.toFixed(1)}</div><img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}"><h3>${movie.title}</h3>`;
                card.onclick = () => movieClickWithAd("https://prmovies.pizza/?s=" + encodeURIComponent(movie.title));
                grid.appendChild(card);
            });
        }

        window.onload = () => {
            fetchMixedTrending('featured-grid');
            fetchAPI(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&page=1`, 'mixed-grid');
        };
        setTimeout(() => { document.getElementById('app-download-banner').style.display = 'flex'; }, 5000);
    </script>
</body>
