<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Movies - Premium Portal</title>
    <style>
        :root {
            --bg-color: #0c0d10;
            --card-bg: #1a1c22;
            --accent: #ffcc00;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { background: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* Modern Header */
        header {
            position: sticky; top: 0; width: 100%; z-index: 1000;
            background: rgba(12, 13, 16, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass);
        }

        .main-nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px;
        }

        .logo { font-size: 22px; font-weight: bold; color: var(--accent); text-decoration: none; }
        
        .nav-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: var(--glass); border: none; color: white; padding: 8px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        /* ক্যাটাগরি বক্স (Rounded & Glossy) */
        .category-box {
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        .category-box::-webkit-scrollbar { display: none; } /* Hide scrollbar for Chrome/Safari */

        .cat-item {
            background: var(--glass);
            padding: 8px 20px;
            border-radius: 25px; /* কোণাগুলো বেকা/গোল করা */
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .cat-item:hover { background: var(--accent); color: #000; }

        /* Search Bar (Hidden by default) */
        #search-input {
            width: 90%; margin: 10px auto; display: none;
            padding: 10px; border-radius: 20px; border: none;
            background: var(--glass); color: white; outline: none;
        }

        /* Movie Grid */
        .content-area { padding: 10px 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        
        .movie-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .movie-card:hover { transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 200px; object-fit: cover; }
        .movie-card h3 { font-size: 12px; margin: 0; text-align: center; padding: 10px; height: 30px; overflow: hidden; }

        /* Ad Overlay */
        #ad-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-go { padding: 15px 35px; background: var(--accent); color: #000; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <header>
        <div class="main-nav">
            <button class="icon-btn" onclick="alert('Menu Coming Soon!')">☰</button>
            <a href="#" class="logo">JK<span>Movies</span></a>
            <div class="nav-icons">
                <button class="icon-btn" onclick="toggleSearch()">🔍</button>
            </div>
        </div>
        
        <input type="text" id="search-input" placeholder="Search movies..." onkeyup="if(event.key==='Enter') handleSearch(this.value)">

        <div class="category-box">
            <div class="cat-item" onclick="handleSearch('Hollywood')">🎬 Hollywood</div>
            <div class="cat-item" onclick="handleSearch('Bollywood')">🇮🇳 Bollywood</div>
            <div class="cat-item" onclick="handleSearch('Hindi')">🍿 Hindi Dubbed</div>
            <div class="cat-item" onclick="handleSearch('Bengali')">🇧🇩 Bengali</div>
        </div>
    </header>

    <div class="content-area">
        <div id="loading" style="text-align:center; padding:50px; color: var(--accent);">SYNCING LATEST UPDATES...</div>
        <div class="container" id="movie-grid"></div>
    </div>

    <div id="ad-overlay">
        <h2 style="color: var(--accent);">Bypassing Security...</h2>
        <div style="width:300px; height:250px; background:#fff; margin-bottom:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#000;">[ AD SPACE ]</div>
        <p id="timer" style="color:white;"></p>
        <button id="final-btn" class="btn-go" style="display:none;">WATCH NOW</button>
    </div>

    <script>
        const API_KEY = '0940ae0fad7498e6f74514a9691fb571';
        const fetchUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&page=1`;

        async function fetchMovies() {
            try {
                const res = await fetch(fetchUrl);
                const data = await res.json();
                renderMovies(data.results);
            } catch (err) { console.log(err); }
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            document.getElementById('loading').style.display = 'none';

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}"><h3>${movie.title}</h3>`;
                card.onclick = () => handleAd(movie.title);
                grid.appendChild(card);
            });
        }

        function handleAd(movieName) {
            const overlay = document.getElementById('ad-overlay');
            const timerText = document.getElementById('timer');
            const watchBtn = document.getElementById('final-btn');
            
            overlay.style.display = 'flex';
            let timeLeft = 5;
            watchBtn.style.display = 'none';

            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = "Generating link in " + timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    timerText.style.display = 'none';
                    watchBtn.style.display = 'block';
                }
            }, 1000);

            watchBtn.onclick = () => {
                overlay.style.display = 'none';
                window.location.href = "https://prmovies.pizza/?s=" + encodeURIComponent(movieName);
            };
        }

        function toggleSearch() {
            const input = document.getElementById('search-input');
            input.style.display = (input.style.display === 'block') ? 'none' : 'block';
        }

        function handleSearch(query) {
            window.location.href = "https://prmovies.pizza/?s=" + encodeURIComponent(query);
        }

        window.onpageshow = function(event) {
            document.getElementById('ad-overlay').style.display = 'none';
        };

        fetchMovies();
    </script>
</body>
</html>
