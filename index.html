<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Movie - Live Sync</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        .header-ad { position: sticky; top: 0; background: #ffcc00; color: #00; padding: 10px; text-align: center; z-index: 1000; font-weight: bold; }
        #mirror-content { width: 100%; height: 100vh; border: none; }
        .loading-screen { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        
        /* কন্টেন্টের ওপর আপনার ইনভিজিবল বা ভাসমান অ্যাড লেয়ার */
        .floating-ad {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 100px;
            background: rgba(255,255,255,0.9);
            z-index: 9999;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header-ad">
        [আপনার ব্যানার বিজ্ঞাপন এখানে] - JK MOVIE
    </div>

    <div id="loader" class="loading-screen">
        <h3>সার্ভারের সাথে কানেক্ট হচ্ছে...</h3>
        <p>Cloudflare ভেরিফিকেশন বাইপাস করার চেষ্টা করা হচ্ছে। দয়া করে ১০-১৫ সেকেন্ড অপেক্ষা করুন।</p>
    </div>

    <iframe id="mirror-content" src="" style="display:none;"></iframe>

    <div class="floating-ad">
        এখানে আপনার পপ-আপ অ্যাড থাকবে
    </div>

    <script>
        const target = "https://prmovies.pizza/";
        
        // এটি একটি শক্তিশালী রিভার্স প্রক্সি যা অনেক সময় ভেরিফিকেশন পার করতে পারে
        const proxyUrl = "https://thingproxy.freeboard.io/fetch/" + target;

        const iframe = document.getElementById('mirror-content');
        const loader = document.getElementById('loader');

        // সোর্স সেট করা
        // নোট: যদি এটি সরাসরি কাজ না করে তবে Google Translate Proxy ব্যবহার করা হচ্ছে (এটি প্রায় সব সময় কাজ করে)
        iframe.src = "https://translate.google.com/translate?sl=en&tl=bn&u=" + encodeURIComponent(target);

        iframe.onload = function() {
            loader.style.display = 'none';
            iframe.style.display = 'block';
        };
    </script>
</body>
</html>
