    <script>
        const API_KEY = '0940ae0fad7498e6f74514a9691fb571';

        window.addEventListener('pageshow', function(event) {
            const overlay = document.getElementById('ad-overlay');
            overlay.style.display = 'none';
        });

        function toggleSearch() {
            const sc = document.getElementById('search-container');
            sc.style.display = (sc.style.display === 'block') ? 'none' : 'block';
        }

        function movieClickWithAd(targetUrl) {
            const overlay = document.getElementById('ad-overlay');
            const timerText = document.getElementById('ad-timer');
            let timeLeft = 5;
            overlay.style.display = 'flex';
            timerText.innerText = `Redirecting in 5 seconds...`;
            const timer = setInterval(() => {
                timeLeft--;
                timerText.innerText = `Redirecting in ${timeLeft} seconds...`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = targetUrl;
                }
            }, 1000);
        }

        function handleSearchEnter(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('search-input').value;
                if(query) movieClickWithAd("https://prmovies.pizza/?s=" + encodeURIComponent(query));
            }
        }

        function handleCategory(cat) {
            movieClickWithAd("https://prmovies.pizza/?s=" + encodeURIComponent(cat));
        }

        async function fetchMovies() {
            try {
                // Dhurandhar Featured
                const fRes = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=Dhurandhar`);
                const fData = await fRes.json();
                renderMovies(fData.results.slice(0, 6), 'featured-grid');

                // ২০০টি মিক্স মুভি লোড করার জন্য লুপ (১০টি পেজ)
                for (let i = 1; i <= 10; i++) {
                    const mixRes = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&page=${i}`);
                    const mixData = await mixRes.json();
                    renderMovies(mixData.results, 'mixed-grid');
                }
            } catch (err) { console.error(err); }
        }

        function renderMovies(movies, gridId) {
            const grid = document.getElementById(gridId);
            if(!grid) return;
            movies.forEach(movie => {
                if (!movie.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<div class="rating">⭐ ${movie.vote_average.toFixed(1)}</div><img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" loading="lazy"><h3>${movie.title}</h3>`;
                card.onclick = () => movieClickWithAd("https://prmovies.pizza/?s=" + encodeURIComponent(movie.title));
                grid.appendChild(card);
            });
        }

        fetchMovies();
        setTimeout(() => { document.getElementById('app-download-banner').style.display = 'flex'; }, 5000);
    </script>
