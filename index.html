<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Movies - Latest Collection</title>
    <style>
        /* ডিজাইন: একদম প্রফেশনাল মুভি সাইটের মতো */
        body { background: #080808; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .ad-header { background: #ffcc00; color: #000; padding: 12px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .movie-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #333; }
        .movie-card:hover { transform: translateY(-5px); border-color: #ffcc00; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; }
        .movie-card h3 { font-size: 13px; padding: 10px; margin: 0; text-align: center; height: 36px; overflow: hidden; color: #eee; }
        .status { text-align: center; margin-top: 100px; font-size: 20px; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="ad-header">
        আপনার ব্যানার বিজ্ঞাপন এখানে (BANNER AD SPACE)
    </div>

    <div id="status-msg" class="status">মুভি ডাটা সিঙ্ক হচ্ছে, দয়া করে ১০ সেকেন্ড অপেক্ষা করুন...</div>
    <div class="container" id="movie-grid"></div>

    <script>
        // যে সাইট থেকে ডাটা আসবে
        const targetSite = 'https://prmovies.pizza/';
        // ডাটা আনার জন্য প্রক্সি (এটি সিকিউরিটি বাইপাস করবে)
        const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetSite);

        async function syncMovies() {
            try {
                const response = await fetch(proxy);
                const data = await response.json();
                const html = data.contents;
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // মূল সাইটের মুভি আইটেমগুলো খুঁজে বের করা
                const items = doc.querySelectorAll('.ml-item'); 
                const grid = document.getElementById('movie-grid');
                document.getElementById('status-msg').style.display = 'none';

                items.forEach(item => {
                    const title = item.querySelector('h2').innerText;
                    // ইমেজ ইউআরএল ঠিক করা
                    let imgSrc = item.querySelector('img').getAttribute('data-original') || item.querySelector('img').src;
                    // যদি ইমেজ লিঙ্ক আধা থাকে তবে পূর্ণ করা
                    if (imgSrc.startsWith('/')) imgSrc = 'https://prmovies.pizza' + imgSrc;
                    
                    const originalLink = item.querySelector('a').href.replace(window.location.origin, 'https://prmovies.pizza');

                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <img src="${imgSrc}" alt="${title}">
                        <h3>${title}</h3>
                    `;
                    
                    // ক্লিকে আপনার অ্যাড বা মুভি লিঙ্কে যাওয়ার লজিক
                    card.onclick = () => {
                        window.location.href = originalLink;
                    };
                    
                    grid.appendChild(card);
                });

            } catch (error) {
                document.getElementById('status-msg').innerText = "সার্ভার রেসপন্স দিচ্ছে না। পেজটি রিফ্রেশ দিন।";
            }
        }

        syncMovies();
    </script>
</body>
</html>
